<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1a17">
<title>Burger 101 — Mobile</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c1a17; --panel:#26231f; --panel-2:#2f2b26;
    --cream:#f6efdf; --gold:#f2b23e; --tomato:#d94f30;
    --smoke:#8c8578; --line:#3a352e;
    --sat:env(safe-area-inset-top,0px);
    --sab:env(safe-area-inset-bottom,0px);
    --nav-h:60px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overscroll-behavior:none}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--ink);color:var(--cream);overflow:hidden;touch-action:manipulation}
  button{font-family:inherit}

  /* ---------- Header ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:1200;
    padding:calc(8px + var(--sat)) 12px 8px;
    display:flex;align-items:center;gap:10px;
    background:linear-gradient(180deg,rgba(28,26,23,.97),rgba(28,26,23,.92));
    border-bottom:1px solid var(--line);
  }
  .logo{line-height:1;flex:1}
  .logo .t1{font-family:'Anton',Impact,sans-serif;font-size:20px;letter-spacing:.5px;color:var(--gold)}
  .logo .t2{font-size:8.5px;letter-spacing:2.5px;color:var(--smoke);text-transform:uppercase;margin-top:3px}
  .icon-btn{
    width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel-2);color:var(--cream);display:flex;align-items:center;justify-content:center;cursor:pointer;
  }

  /* search overlay */
  #searchBar{
    position:fixed;top:0;left:0;right:0;z-index:1400;
    padding:calc(8px + var(--sat)) 12px 8px;
    display:none;align-items:center;gap:8px;
    background:var(--ink);border-bottom:1px solid var(--line);
  }
  #searchBar.open{display:flex}
  #searchBar input{
    flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;
    color:var(--cream);font:500 16px 'Inter',sans-serif;padding:11px 16px;outline:none;
  }
  #searchBar input::placeholder{color:var(--smoke)}

  /* ---------- Chips ---------- */
  .chips{
    position:fixed;z-index:1150;left:0;right:0;
    top:calc(58px + var(--sat));
    display:flex;gap:8px;padding:8px 12px;overflow-x:auto;scrollbar-width:none;
    -webkit-overflow-scrolling:touch;
  }
  .chips::-webkit-scrollbar{display:none}
  .chip{
    flex:none;padding:9px 16px;border-radius:999px;font:600 13px 'Inter',sans-serif;
    background:var(--panel);border:1px solid var(--line);color:var(--cream);
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .chip.on{background:var(--gold);border-color:var(--gold);color:var(--ink)}

  /* ---------- Map ---------- */
  #map{position:fixed;inset:0;bottom:calc(var(--nav-h) + var(--sab));z-index:1;background:#d8e0e0}
  .leaflet-container{font-family:'Inter',sans-serif}
  .leaflet-control-zoom{display:none} /* pinch to zoom on mobile */
  .leaflet-control-attribution{font-size:9px;opacity:.75}

  .badge{
    display:flex;align-items:center;justify-content:center;
    width:38px;height:38px;border-radius:50% 50% 50% 4px;
    font:700 13px 'Inter',sans-serif;color:var(--ink);
    border:2px solid var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.45);
    transform:rotate(-8deg);
  }
  .badge.gold{background:var(--gold)}
  .badge.tomato{background:var(--tomato);color:var(--cream)}
  .badge.char{background:var(--cream);color:var(--ink)}
  .cluster{
    display:flex;align-items:center;justify-content:center;
    width:44px;height:44px;border-radius:50%;
    background:var(--tomato);color:var(--cream);
    font:700 14px 'Inter',sans-serif;border:2px solid var(--ink);
    box-shadow:0 2px 8px rgba(0,0,0,.45);
  }

  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--cream);border-radius:14px;border:1px solid var(--line)}
  .leaflet-popup-tip{background:var(--panel)}
  .leaflet-popup-content{margin:14px 16px;min-width:200px}
  .pp-rank{font-family:'Anton',Impact,sans-serif;font-size:13px;color:var(--gold);letter-spacing:1px}
  .pp-name{font-family:'Anton',Impact,sans-serif;font-size:20px;letter-spacing:.5px;margin:2px 0 1px}
  .pp-city{font-size:13px;color:var(--smoke);margin-bottom:12px}
  .pp-actions{display:flex;gap:8px}
  .pp-actions a{flex:1;text-align:center;text-decoration:none;padding:11px 6px;border-radius:10px;font:600 13px 'Inter',sans-serif}
  .pp-dir{background:var(--gold);color:var(--ink)}
  .pp-ig{background:var(--panel-2);color:var(--cream);border:1px solid var(--line)}
  .pp-note{font-size:10px;color:var(--smoke);margin-top:8px}

  /* ---------- Locate FAB ---------- */
  #locBtn{
    position:fixed;z-index:1100;right:14px;
    bottom:calc(var(--nav-h) + var(--sab) + 130px);
    width:50px;height:50px;border-radius:50%;
    background:var(--panel);color:var(--cream);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,.45);
  }

  /* ---------- Bottom sheet ---------- */
  #sheet{
    position:fixed;left:0;right:0;z-index:1250;
    bottom:calc(var(--nav-h) + var(--sab));
    height:calc(100% - 110px - var(--sat) - var(--nav-h) - var(--sab));
    background:var(--panel);border-top-left-radius:20px;border-top-right-radius:20px;
    border:1px solid var(--line);border-bottom:none;
    display:flex;flex-direction:column;
    transform:translateY(calc(100% - 108px));
    transition:transform .25s ease;
    box-shadow:0 -6px 24px rgba(0,0,0,.4);
  }
  #sheet.half{transform:translateY(52%)}
  #sheet.full{transform:translateY(0)}
  #sheet.drag{transition:none}
  .grab{padding:10px 0 4px;display:flex;justify-content:center;flex:none;cursor:grab}
  .grab span{width:44px;height:5px;border-radius:99px;background:var(--line)}
  .sheet-head{display:flex;align-items:baseline;gap:10px;padding:2px 18px 10px;flex:none}
  .sheet-head h2{font-family:'Anton',Impact,sans-serif;font-size:17px;letter-spacing:1px}
  .sheet-head .cnt{font-size:12px;color:var(--smoke)}
  .sheet-head .near{margin-left:auto;font:600 12px 'Inter',sans-serif;color:var(--gold);background:none;border:1px solid var(--gold);border-radius:999px;padding:6px 12px}
  .sheet-head .near.on{background:var(--gold);color:var(--ink)}
  #list{flex:1;overflow-y:auto;padding:0 10px 14px;-webkit-overflow-scrolling:touch}
  .row{
    display:flex;align-items:center;gap:14px;padding:13px 10px;
    border-bottom:1px solid var(--line);border-radius:10px;
  }
  .row:active{background:var(--panel-2)}
  .row .rk{
    flex:none;width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font:700 14px 'Inter',sans-serif;color:var(--ink);
  }
  .rk.gold{background:var(--gold)} .rk.tomato{background:var(--tomato);color:var(--cream)} .rk.char{background:var(--cream)}
  .row .info{flex:1;min-width:0}
  .row .nm{font:600 15px 'Inter',sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .ct{font-size:12.5px;color:var(--smoke);margin-top:2px}
  .row .dist{flex:none;font:600 12px 'Inter',sans-serif;color:var(--gold)}
  .empty{padding:30px;text-align:center;color:var(--smoke);font-size:13px}

  /* ---------- Bottom nav ---------- */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:1300;
    height:calc(var(--nav-h) + var(--sab));
    padding-bottom:var(--sab);
    background:var(--ink);border-top:1px solid var(--line);
    display:flex;
  }
  nav button{
    flex:1;background:none;border:none;color:var(--smoke);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    font:600 10.5px 'Inter',sans-serif;letter-spacing:.4px;
  }
  nav button.on{color:var(--gold)}
  nav svg{width:22px;height:22px}

  /* ---------- Toast ---------- */
  #toast{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(var(--nav-h) + var(--sab) + 16px);z-index:1500;
    background:var(--panel-2);border:1px solid var(--line);color:var(--cream);
    font:500 12.5px 'Inter',sans-serif;padding:11px 16px;border-radius:12px;
    max-width:88%;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s;
    box-shadow:0 4px 16px rgba(0,0,0,.45);
  }
  #toast.show{opacity:1}
</style>
</head>

const cluster=L.markerClusterGroup({
  showCoverageOnHover:false,maxClusterRadius:46,
  iconCreateFunction:c=>L.divIcon({html:`<div class="cluster">${c.getChildCount()}</div>`,className:'',iconSize:[44,44]})
});

function popupHtml(d){
  const gm=`https://www.google.com/maps/search/${encodeURIComponent(d.name+' '+d.city)}`;
  return `<div>
    <div class="pp-rank">NO. ${d.rank}</div>
    <div class="pp-name">${d.name.toUpperCase()}</div>
    <div class="pp-city">${d.city}</div>
    <div class="pp-actions">
      <a class="pp-dir" href="${gm}" target="_blank" rel="noopener">Directions</a>
      <a class="pp-ig" href="https://www.instagram.com/${d.ig}/" target="_blank" rel="noopener">Instagram</a>
    </div>
    <div class="pp-note">Pin shows the neighbourhood — tap Directions for the exact address.</div>
  </div>`;
}
data.forEach(d=>{
  d.marker=L.marker([d.lat,d.lng],{
    icon:L.divIcon({html:`<div class="badge ${tier(d.rank)}">${d.rank}</div>`,className:'',iconSize:[38,38],iconAnchor:[19,34]})
  }).bindPopup(popupHtml(d));
});

// ---------- State / filtering ----------
const listEl=document.getElementById('list'),cntEl=document.getElementById('cnt'),qEl=document.getElementById('q');
let activeFilter='all',me=null,nearMode=false;

const havKm=(a,b,c,d)=>{
  const t=Math.PI/180,x=(c-a)*t,y=(d-b)*t;
  const h=Math.sin(x/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(y/2)**2;
  return 6371*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h));
};
const fmtKm=k=>k<1?Math.round(k*1000)+' m':k<100?k.toFixed(1)+' km':Math.round(k)+' km';

function visible(){
  const q=qEl.value.trim().toLowerCase();
  let v=data.filter(d=>{
    if(activeFilter==='top10'&&d.rank>10)return false;
    if(activeFilter==='top25'&&d.rank>25)return false;
    if(['Europe','Americas','Asia','Oceania','Africa'].includes(activeFilter)&&d.region!==activeFilter)return false;
    if(q&&!(d.name.toLowerCase().includes(q)||d.city.toLowerCase().includes(q)))return false;
    return true;
  });
  if(nearMode&&me){
    v.forEach(d=>d.km=havKm(me[0],me[1],d.lat,d.lng));
    v=v.slice().sort((a,b)=>a.km-b.km);
  }
  return v;
}

function render(){
  const v=visible();
  cluster.clearLayers();
  v.forEach(d=>cluster.addLayer(d.marker));
  if(!map.hasLayer(cluster))map.addLayer(cluster);

  cntEl.textContent=`${v.length} place${v.length===1?'':'s'}`;
  listEl.innerHTML=v.length?'':'<div class="empty">No burgers match that search. Try another name or city.</div>';
  v.forEach(d=>{
    const row=document.createElement('div');
    row.className='row';
    row.innerHTML=`<div class="rk ${tier(d.rank)}">${d.rank}</div>
      <div class="info"><div class="nm">${d.name}</div><div class="ct">${d.city}</div></div>
      ${nearMode&&me?`<div class="dist">${fmtKm(d.km)}</div>`:''}`;
    row.onclick=()=>{
      setSheet('peek');
      map.setView([d.lat,d.lng],14,{animate:true});
      setTimeout(()=>d.marker.openPopup(),350);
    };
    listEl.appendChild(row);
  });
}

qEl.addEventListener('input',render);
document.getElementById('chips').addEventListener('click',e=>{
  const b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  b.classList.add('on');activeFilter=b.dataset.f;render();
  const v=visible();
  if(v.length&&activeFilter!=='all')map.fitBounds(L.latLngBounds(v.map(d=>[d.lat,d.lng])),{padding:[40,40]});
});

// ---------- Search overlay ----------
const searchBar=document.getElementById('searchBar');
document.getElementById('openSearch').onclick=()=>{searchBar.classList.add('open');qEl.focus();setSheet('half')};
document.getElementById('closeSearch').onclick=()=>{searchBar.classList.remove('open');qEl.value='';render()};

// ---------- Bottom sheet: peek / half / full + drag ----------
const sheet=document.getElementById('sheet');
let sheetState='peek';
function setSheet(s){
  sheetState=s;
  sheet.classList.remove('half','full','drag');
  if(s==='half')sheet.classList.add('half');
  if(s==='full')sheet.classList.add('full');
  syncNav(s==='peek'?'map':'list');
}
let dragY=null,startState=null;
const grab=document.getElementById('grab');
grab.addEventListener('touchstart',e=>{dragY=e.touches[0].clientY;startState=sheetState;sheet.classList.add('drag')},{passive:true});
grab.addEventListener('touchmove',e=>{
  if(dragY===null)return;
  const dy=e.touches[0].clientY-dragY;
  const base=startState==='full'?0:startState==='half'?window.innerHeight*.52:sheet.offsetHeight-108;
  const y=Math.max(0,base+dy);
  sheet.style.transform=`translateY(${y}px)`;
},{passive:true});
grab.addEventListener('touchend',e=>{
  sheet.style.transform='';sheet.classList.remove('drag');
  if(dragY===null)return;
  const dy=e.changedTouches[0].clientY-dragY;dragY=null;
  if(dy<-40)setSheet(startState==='peek'?'half':'full');
  else if(dy>40)setSheet(startState==='full'?'half':'peek');
  else setSheet(startState);
});
grab.addEventListener('click',()=>setSheet(sheetState==='peek'?'half':'peek'));

// ---------- Bottom nav ----------
const navMap=document.getElementById('navMap'),navList=document.getElementById('navList'),navTop=document.getElementById('navTop');
function syncNav(which){
  navMap.classList.toggle('on',which==='map');
  navList.classList.toggle('on',which==='list');
}
navMap.onclick=()=>setSheet('peek');
navList.onclick=()=>setSheet('full');
navTop.onclick=()=>{
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.f==='top10'));
  activeFilter='top10';render();setSheet('half');
  const v=visible();
  if(v.length)map.fitBounds(L.latLngBounds(v.map(d=>[d.lat,d.lng])),{padding:[40,40]});
};

// ---------- Location ----------
let meMarker=null;
function locate(cb){
  if(!navigator.geolocation){toast('Location is not available in this browser.');return}
  navigator.geolocation.getCurrentPosition(p=>{
    me=[p.coords.latitude,p.coords.longitude];
    if(meMarker)meMarker.remove();
    meMarker=L.circleMarker(me,{radius:8,color:'#f2b23e',weight:3,fillColor:'#f2b23e',fillOpacity:.4}).addTo(map).bindPopup('You are here');
    cb&&cb();
  },()=>toast('Could not get your location. Check that location access is allowed for this page.'));
}
document.getElementById('locBtn').onclick=()=>locate(()=>map.setView(me,11,{animate:true}));

const nearBtn=document.getElementById('nearBtn');
nearBtn.onclick=()=>{
  if(nearMode){nearMode=false;nearBtn.classList.remove('on');nearBtn.textContent='Near me';render();return}
  locate(()=>{
    nearMode=true;nearBtn.classList.add('on');nearBtn.textContent='Sorted by distance';
    render();setSheet('full');
  });
};

// ---------- Toast ----------
const toastEl=document.getElementById('toast');let toastT=null;
function toast(msg,ms=3500){
  toastEl.textContent=msg;toastEl.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>toastEl.classList.remove('show'),ms);
}

render();
setTimeout(()=>toast('Tip: tap ⋮ in Chrome → “Add to Home Screen” to install this as an app'),1600);
</script>
</body>
</html>
